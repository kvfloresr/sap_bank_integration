services:
  sap-bank-web:
    build: .
    container_name: sap_bank_web
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - C:\SAP_LTH:/data/lth
      - C:\SAP_BurgerKing:/data/bk
      - ./config:/app/config:ro
    environment:
      - SAP_WEB_SECRET=cambiar-por-clave-segura
      - DB_SERVER=192.168.250.13
      - DB_NAME=SAPBankAudit
      - DB_USER=sa
      - DB_PASSWORD=TU_PASSWORD_AQUI
    healthcheck:
      test: ["CMD", "python", "-c",
            "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"