<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · SAP Pagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
<div class="login-wrap">
<div class="login-card">
    <div class="login-logo">PR</div>
    <h1 class="login-title">Pagos Recibidos</h1>
    <p class="login-sub">SAP Business One · Acceso restringido</p>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" class="login-form">
    <div class="login-field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email"
            placeholder="usuario@empresa.com" required autofocus>
    </div>
    <div class="login-field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
            placeholder="••••••••" required>
    </div>
    <button type="submit" class="login-submit">Ingresar</button>
    </form>
</div>
<p class="login-footer">Comversa S.A. · Sistema interno · Uso exclusivo de personal autorizado</p>
</div>
</body>
</html>
