  # Debe verse asi: https://LA.IP.DE.BK:50000/b1s/v1
  base_url: "https://52.254.106.101:50000/b1s/v1"
  company_db: "BOLIVIAN_FOODS_PROD"
  username: "INTSALAR"
  password: "z+Y&LR8a"
  verify_ssl: false          # certificado auto-firmado, igual que TAJIBOS
  session_timeout_minutes: 30

paths:
  # Carpetas SEPARADAS para Burger King (no se mezclan con TAJIBOS)
  inbound:   "C:\\SAP_BurgerKing\\Inbound"
  processed: "C:\\SAP_BurgerKing\\Procesados"
  errors:    "C:\\SAP_BurgerKing\\Errores"
  reports:   "C:\\SAP_BurgerKing\\Reportes"

accounts:
  # Cuentas default si una fila viniera sin cuenta de mayor.
  # Tomadas del Excel de prueba de BK:
  cash_account:     "_SYS00000001373"
  transfer_account: "_SYS00000001381"
  default_card_code: 1

concurrency:
  max_workers: 6

retry:
  max_attempts: 3
  backoff_seconds: 5

idempotency:
  enabled: false             # sin idempotencia, igual que LTH
  reference_field: "U_RefBanco"